version: "3.9"

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: ./backend
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017/saarthi
      JWT_SECRET: replace-with-a-long-secret
      UPLOAD_DIR: /app/storage/uploads
    ports:
      - "4000:4000"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      - mongodb

  web:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_PROXY_BASE: /api/proxy
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongodb_data:
